{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card shadow p-4">
            <h3 class="text-center mb-3">Recover Password</h3>
            <p class="text-muted text-center small">Enter your email address and we will generate a verification token for your account.</p>
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="mb-3">
                    <label>Account Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button class="btn btn-primary w-100 mb-2">Request Reset Token</button>
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" class="text-muted small">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
