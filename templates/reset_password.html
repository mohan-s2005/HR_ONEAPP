{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card shadow p-4">
            <h3 class="text-center mb-3">Reset Credentials</h3>
            <form method="POST" action="{{ url_for('auth.reset_password') }}">
                <div class="mb-3">
                    <label>Confirm Account Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>6-Digit Verification Token (OTP)</label>
                    <input type="text" name="otp" class="form-control" maxlength="6" placeholder="000000" required>
                </div>
                <div class="mb-3">
                    <label>New Secure Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button class="btn btn-success w-100 mb-2">Update Password</button>
                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" class="text-muted small">Cancel and Return</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
